<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>VibeFlow — Music</title>
    <style>
        :root { --bg: #090909; --accent: #1DB954; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: #000; padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 10px; text-align: center; }
        iframe { border-radius: 12px; width: 100%; height: 80px; border: none; }
        .search-box { margin-bottom: 20px; }
        input { padding: 10px; border-radius: 20px; border: none; width: 250px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: var(--accent); cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent)">VibeFlow</h2>
        <p>К сожалению, ваш провайдер блокирует поиск, но Джарвис нашел выход!</p>
        <hr>
        <h3>Топ Радио:</h3>
        <div onclick="loadRadio(1)" style="cursor:pointer; margin-bottom:10px;">📻 Record Phonk</div>
        <div onclick="loadRadio(2)" style="cursor:pointer; margin-bottom:10px;">📻 Deep House</div>
    </div>
    <div class="main">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск (может блокироваться)...">
            <button onclick="searchMusic()">Поиск</button>
        </div>
        <div id="results" class="grid">
            <!-- Плейлист по умолчанию -->
            <div class="card">
                <h3>The Weeknd - Blinding Lights</h3>
                <iframe src="https://deezer.com"></iframe>
            </div>
            <div class="card">
                <h3>Linkin Park - Numb</h3>
                <iframe src="https://deezer.com"></iframe>
            </div>
            <div class="card">
                <h3>Nirvana - Teen Spirit</h3>
                <iframe src="https://deezer.com"></iframe>
            </div>
        </div>
    </div>

    <script>
        async function searchMusic() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('results');
            grid.innerHTML = '<p>Пробуем найти...</p>';
            
            // Пробуем через резервный прокси
            try {
                const res = await fetch(`https://allorigins.win{encodeURIComponent('https://deezer.com)}`);
                const json = await res.json();
                const data = JSON.parse(json.contents);
                grid.innerHTML = '';
                data.data.forEach(t => {
                    grid.innerHTML += `<div class="card"><h3>${t.title}</h3><iframe src="https://deezer.com{t.id}"></iframe></div>`;
                });
            } catch (e) {
                grid.innerHTML = '<p>Поиск всё еще заблокирован провайдером. Слушайте наши хиты!</p>';
            }
        }

        function loadRadio(type) {
            const grid = document.getElementById('results');
            if(type === 1) grid.innerHTML = '<h3>Record Phonk</h3><audio controls autoplay src="https://regru.ru"></audio>';
            if(type === 2) grid.innerHTML = '<h3>Deep House</h3><audio controls autoplay src="https://regru.ru"></audio>';
        }
    </script>
</body>
</html>
