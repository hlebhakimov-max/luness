<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeFlow — Music</title>
    <style>
        :root { --bg: #090909; --card: #181818; --accent: #1DB954; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: #000; padding: 20px; border-right: 1px solid #333; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        .search-box { margin-bottom: 30px; display: flex; gap: 10px; }
        input { background: #242424; border: none; padding: 12px 20px; border-radius: 50px; color: #fff; width: 300px; outline: none; }
        button { background: var(--accent); border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; transition: 0.3s; }
        .card:hover { background: #282828; transform: translateY(-5px); }
        .card img { width: 100%; aspect-ratio: 1; border-radius: 5px; margin-bottom: 10px; object-fit: cover; }
        .title { font-weight: bold; font-size: 14px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist { color: #b3b3b3; font-size: 12px; margin: 5px 0 10px; }
        audio { width: 100%; height: 30px; filter: invert(1); }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent)">VibeFlow</h2>
        <div style="cursor:pointer; margin-top:20px;" onclick="searchMusic('Top Hits')">🏠 Главная</div>
        <div style="cursor:pointer; margin-top:10px;" onclick="searchMusic('Phonk')">🚗 Фонк</div>
    </div>
    <div class="main">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск музыки..." onkeypress="if(event.key==='Enter') searchMusic()">
            <button onclick="searchMusic()">Найти</button>
        </div>
        <div id="results" class="grid"></div>
    </div>

    <script>
        async function searchMusic(query) {
            const term = query || document.getElementById('searchInput').value;
            if (!term) return;
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Джарвис загружает треки...</p>';

            try {
                // Используем JSONP подход — он обходит любые CORS блокировки
                const script = document.createElement('script');
                const callbackName = 'jsonp_callback_' + Math.round(100000 * Math.random());
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    displayResults(data.results);
                };

                script.src = `https://apple.com{encodeURIComponent(term)}&media=music&limit=30&callback=${callbackName}`;
                document.body.appendChild(script);
            } catch (e) {
                resultsDiv.innerHTML = '<p>Ошибка. Попробуйте сменить запрос.</p>';
            }
        }

        function displayResults(tracks) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            if (!tracks || tracks.length === 0) {
                resultsDiv.innerHTML = '<p>Ничего не найдено.</p>';
                return;
            }

            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${track.artworkUrl100.replace('100x100bb', '400x400bb')}" alt="Cover">
                    <p class="title">${track.trackName}</p>
                    <p class="artist">${track.artistName}</p>
                    <audio controls preload="none">
                        <source src="${track.previewUrl}" type="audio/mpeg">
                    </audio>
                `;
                resultsDiv.appendChild(card);
            });
        }

        window.onload = () => searchMusic('Top Hits');
    </script>
</body>
</html>
