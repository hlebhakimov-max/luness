<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeFlow — Музыкальный плеер</title>
    <style>
        :root {
            --bg-black: #000000;
            --bg-dark: #121212;
            --card-color: #181818;
            --hover-color: #282828;
            --accent-color: #1DB954;
            --text-main: #ffffff;
            --text-secondary: #b3b3b3;
            --sidebar-width: 240px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Боковая панель */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 20px;
        }

        .sidebar-nav, .sidebar-library {
            background-color: var(--bg-dark);
            border-radius: 8px;
            padding: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .nav-item:hover { color: white; }

        .logo { font-size: 1.5rem; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; display: block; text-decoration: none; }

        /* Основной контент */
        .main-content {
            flex: 1;
            background: linear-gradient(to bottom, #222, var(--bg-dark));
            overflow-y: auto;
            border-radius: 8px;
            margin: 8px 8px 8px 0;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container form { display: flex; gap: 10px; }

        .search-container input {
            background-color: #242424;
            border: 1px solid transparent;
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            width: 300px;
            outline: none;
        }

        .search-container input:focus { border-color: white; }

        .search-container button {
            background-color: white;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Сетка песен */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .card {
            background-color: var(--card-color);
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
            text-align: left;
        }

        .card:hover { background-color: var(--hover-color); }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .track-title { font-weight: bold; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: var(--text-secondary); font-size: 0.85rem; margin: 5px 0 12px; }

        audio {
            width: 100%;
            height: 30px;
            filter: invert(1);
        }

        .status-msg { text-align: center; padding: 50px; color: var(--text-secondary); }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="/" class="logo">VibeFlow</a>
        <div class="sidebar-nav">
            <a href="/" class="nav-item">🏠 Главная</a>
        </div>
        <div class="sidebar-library">
            <p style="margin-left: 10px; font-weight: bold; font-size: 0.9rem;">БЫСТРЫЙ ПОИСК</p>
            <a href="/?search=Top+Hits" class="nav-item">🔥 Топ хиты</a>
            <a href="/?search=Phonk" class="nav-item">🚗 Фонк</a>
            <a href="/?search=Lo-fi" class="nav-item">☕️ Релакс</a>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div class="search-container">
                <form action="/" method="get">
                    <!-- Атрибут name="search" должен совпадать с тем, что в app.py -->
                    <input type="text" name="search" placeholder="Поиск артиста или трека..." value="{{ query }}">
                    <button type="submit">Найти</button>
                </form>
            </div>
        </header>

        <div class="grid">
            {% if tracks %}
                {% for track in tracks %}
                <div class="card">
                    <img src="{{ track.album.cover_medium }}" alt="Обложка">
                    <p class="track-title">{{ track.title }}</p>
                    <p class="artist-name">{{ track.artist.name }}</p>
                    <audio controls>
                        <source src="{{ track.preview }}" type="audio/mpeg">
                    </audio>
                </div>
                {% endfor %}
            {% else %}
                <div class="status-msg">
                    <h3>Ничего не нашли по запросу "{{ query }}"</h3>
                    <p>Попробуйте ввести название группы или песни еще раз.</p>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
