<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeFlow — Твой музыкальный мир</title>
    <style>
        :root {
            --bg-black: #000000;
            --bg-dark: #121212;
            --card-color: #181818;
            --hover-color: #282828;
            --accent-color: #1DB954;
            --text-main: #ffffff;
            --text-secondary: #b3b3b3;
            --sidebar-width: 240px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Сайдбар */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-black);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            gap: 20px;
        }

        .sidebar-nav, .sidebar-library {
            background-color: var(--bg-dark);
            border-radius: 8px;
            padding: 15px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item:hover { color: white; }

        .logo { font-size: 1.5rem; color: var(--accent-color); font-weight: bold; margin-bottom: 10px; }

        /* Контент */
        .main-content {
            flex: 1;
            background: linear-gradient(to bottom, #222, var(--bg-dark));
            overflow-y: auto;
            border-radius: 8px;
            margin: 8px 8px 8px 0;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 40px;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-container { display: flex; gap: 10px; }

        .search-container input {
            background-color: #242424;
            border: 1px solid transparent;
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            width: 300px;
            outline: none;
        }

        .search-container button {
            background-color: var(--accent-color);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Сетка */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px 40px;
        }

        .card {
            background-color: var(--card-color);
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .card:hover { background-color: var(--hover-color); transform: translateY(-5px); }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .track-title { font-weight: bold; margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: var(--text-secondary); font-size: 12px; margin: 5px 0 15px; }

        iframe { border-radius: 12px; }

        .loading-msg { text-align: center; padding: 50px; color: var(--text-secondary); grid-column: 1/-1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">VibeFlow</div>
        <div class="sidebar-nav">
            <div class="nav-item" onclick="searchMusic('Top Hits')">🏠 Главная</div>
        </div>
        <div class="sidebar-library">
            <p style="margin-left: 10px; font-weight: bold; font-size: 0.8rem; color: var(--text-secondary);">ЖАНРЫ</p>
            <div class="nav-item" onclick="searchMusic('Phonk')">🚗 Фонк</div>
            <div class="nav-item" onclick="searchMusic('Russian Rock')">🎸 Рок</div>
            <div class="nav-item" onclick="searchMusic('Lofi Hip Hop')">☕ Релакс</div>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div class="search-container">
                <input type="text" id="musicInput" placeholder="Поиск музыки..." onkeypress="if(event.key==='Enter') searchMusic()">
                <button onclick="searchMusic()">Найти</button>
            </div>
        </header>

        <div class="grid" id="resultsGrid">
            <!-- Сюда попадут результаты -->
        </div>
    </div>

    <script>
        async function searchMusic(customQuery = null) {
            const query = customQuery || document.getElementById('musicInput').value;
            if (!query) return;

            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '<div class="loading-msg">Джарвис пробивает каналы связи...</div>';

            // Используем AllOrigins для обхода CORS и блокировок
            const apiLink = `https://deezer.com{encodeURIComponent(query)}`;
            const proxyUrl = `https://allorigins.win{encodeURIComponent(apiLink)}`;

            try {
                const response = await fetch(proxyUrl);
                const rawData = await response.json();
                const data = JSON.parse(rawData.contents);
                
                grid.innerHTML = ''; 

                if (!data.data || data.data.length === 0) {
                    grid.innerHTML = '<div class="loading-msg">Ничего не найдено.</div>';
                    return;
                }

                data.data.forEach(track => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${track.album.cover_medium}" alt="Cover">
                        <p class="track-title">${track.title}</p>
                        <p class="artist-name">${track.artist.name}</p>
                        <iframe title="deezer-widget" src="https://deezer.com{track.id}" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media; clipboard-write"></iframe>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = '<div class="loading-msg">Ошибка доступа. Попробуйте обновить страницу или сменить запрос.</div>';
                console.error('Error:', error);
            }
        }

        // Запуск при загрузке
        window.onload = () => searchMusic('Top Hits');
    </script>
</body>
</html>
