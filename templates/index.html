<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Music - Ultra Compact</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Узкая боковая панель */
        .sidebar {
            width: 160px;
            background-color: #000000;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid #282828;
        }

        .sidebar h2 { color: #1DB954; font-size: 18px; margin-bottom: 15px; text-align: center; }

        .menu-item {
            color: #b3b3b3;
            font-weight: bold;
            font-size: 13px;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .menu-item:hover, .menu-item.active {
            color: #ffffff;
            background-color: #1e1e1e;
        }

        /* Основная область */
        .main-content {
            flex: 1;
            background: linear-gradient(to bottom, #181818, #121212);
            padding: 20px;
            overflow-y: auto;
        }

        .search-area {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
        }

        input {
            background-color: #242424;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            width: 250px;
            font-size: 13px;
            outline: none;
        }

        button#search-btn {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
        }

        /* Ультра-сетка: 6 карточек в ряд */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            width: 100%;
        }

        .track-card {
            background: #181818;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #232323;
            transition: 0.2s;
            position: relative;
        }

        .track-card:hover { background: #282828; }

        .track-card img {
            width: 100%;
            border-radius: 4px;
            aspect-ratio: 1/1;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .fav-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .track-info h3 {
            font-size: 12px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-info p {
            color: #b3b3b3;
            font-size: 10px;
            margin: 4px 0 8px 0;
        }

        audio { 
            width: 100%; 
            height: 20px; 
            filter: invert(100%); 
        }

        h1#page-title { font-size: 18px; margin: 0 0 15px 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>JARVIS</h2>
        <div class="menu-item active" id="menu-search">🔍 Поиск</div>
        <div class="menu-item" id="menu-favorites">💚 Избранное</div>
    </div>

    <div class="main-content">
        <div id="search-section">
            <div class="search-area">
                <input type="text" id="search-input" placeholder="Поиск...">
                <button id="search-btn">Найти</button>
            </div>
        </div>

        <h1 id="page-title">Главная</h1>

        <div id="results">
            <!-- Здесь будут мини-карточки -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
